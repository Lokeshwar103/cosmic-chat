<!DOCTYPE html>
<html>
<head>
  <title>Cosmic Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <div class="side">
    <div class="brand">
      <h2>💬 Cosmic Chat</h2>
      <span class="badge" id="meTag">me</span>
    </div>

    <button class="btn" onclick="goGroup()">🏠 Group Chat</button>

    <!-- THEME TOGGLE -->
    <button class="btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
    <button class="btn" onclick="toggleView()" id="viewBtn">📱 Mobile View</button>

    <div class="sectionTitle">Online users</div>
    <ul id="usersList" class="userList"></ul>

    <button class="btn danger" onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <div class="top" id="normalTop">
      <div>
        <h3 id="chatTitle">Group Chat</h3>
        <div class="sub" id="chatSub">Everyone can see these messages</div>
      </div>
      <div class="sub" id="onlineCount">Online: 0</div>
    </div>

    <div class="selectionTop" id="selectionTop" style="display:none;">
      <span id="selectedCount">0 selected</span>
      <div>
        <button class="iconBtn" onclick="clearSelection()">Cancel</button>
        <button class="iconBtn danger" onclick="deleteSelected()">🗑</button>
      </div>
    </div>

    <div id="chatBox" class="box"></div>
    <div id="typingStatus" class="typing"></div>

    <div class="bottom">
      <input id="messageInput" placeholder="Type message..." />
      <button id="sendBtn" class="btn">Send</button>
    </div>

  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

<script>

function logout(){
  localStorage.clear();
  window.location.href="/login.html";
}
document.getElementById("meTag").innerText = localStorage.getItem("username") || "me";
/* =========================
   THEME TOGGLE SYSTEM
========================= */

const themeBtn = document.getElementById("themeBtn");

// load saved theme
const savedTheme = localStorage.getItem("theme");

if(savedTheme === "light"){
  document.body.classList.add("light");
  themeBtn.innerText = "🌙 Dark Mode";
}else{
  themeBtn.innerText = "☀ Light Mode";
}

function toggleTheme(){

  document.body.classList.toggle("light");

  if(document.body.classList.contains("light")){
    localStorage.setItem("theme","light");
    themeBtn.innerText = "🌙 Dark Mode";
  }else{
    localStorage.setItem("theme","dark");
    themeBtn.innerText = "☀ Light Mode";
  }

}

</script>

</body>
</html>
