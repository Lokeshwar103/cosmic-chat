<!DOCTYPE html>
<html>
<head>
<title>Register - Cosmic Chat</title>

<style>

body{
font-family: Arial;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#1e1e1e;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#ffd700;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

#otpSection{
display:none;
}

</style>
</head>

<body>

<div class="card">

<h2>Cosmic Chat</h2>

<div id="registerSection">

<input id="username" placeholder="Username">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button id="registerBtn" onclick="register()">Register</button>

</div>


<div id="otpSection">

<h3>Enter OTP</h3>

<input id="otp" placeholder="OTP">

<button onclick="verify()">Verify</button>

</div>

</div>


<script>

async function register(){

console.log("Register clicked");

// disable button (prevent spam clicks)
document.getElementById("registerBtn").disabled = true;

const username=document.getElementById("username").value.trim();
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value.trim();

if(!username || !email || !password){
alert("Enter username, email and password");
document.getElementById("registerBtn").disabled = false;
return;
}

// ✅ SHOW OTP UI IMMEDIATELY (NO WAIT)
document.getElementById("registerSection").style.display="none";
document.getElementById("otpSection").style.display="block";

console.log("Switched to OTP section instantly");

try{

const res = await fetch("https://cosmic-chat-y27g.onrender.com/api/auth/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username,
email,
password
})
});

// ⚠️ safe parsing (prevents crash if server slow)
let data = {};
try {
data = await res.json();
} catch(e){
console.log("JSON parse failed");
}

if(data.message){
alert(data.message);
}

}catch(err){
console.log("Error:", err);
alert("Server slow, continue with OTP");
}

}

async function verify(){

const otp=document.getElementById("otp").value.trim();
const email=document.getElementById("email").value.trim();

if(!otp){
alert("Enter OTP");
return;
}

try{

const res = await fetch("https://cosmic-chat-y27g.onrender.com/api/auth/verify",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email,
otp
})
});

const data = await res.json();

alert(data.message);

if(res.ok){
window.location.href="/login.html";
}

}catch(err){
console.log(err);
alert("Verification failed");
}

}

</script>

</body>
</html>
