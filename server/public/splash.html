<!DOCTYPE html>
<html>
<head>
  <title>Cosmic Chat</title>

  <style>
    body {
      margin: 0;
      background: black;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .startScreen {
      color: #FFD700;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      border: 2px solid #FFD700;
      padding: 15px 30px;
      border-radius: 30px;
      transition: 0.3s;
    }

    .startScreen:hover {
      background: #FFD700;
      color: black;
    }
  </style>
</head>

<body>

  <video id="introVideo" playsinline>
    <source src="/intro.mp4" type="video/mp4">
  </video>

  <div class="startScreen" id="startBtn">
    ▶ Enter Cosmic Chat
  </div>

  <script>
    const video = document.getElementById("introVideo");
    const startBtn = document.getElementById("startBtn");

    startBtn.addEventListener("click", async () => {
      startBtn.style.display = "none";
      video.style.display = "block";

      video.muted = false;   // allow sound
      video.volume = 1;

      try {
        await video.play();
      } catch (err) {
        console.error("Play failed:", err);
      }
    });

    video.onended = () => {
      window.location.href = "/login.html";
    };
  </script>

</body>
</html>
